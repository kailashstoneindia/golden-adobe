name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant builds on the same PR to save GitHub Action minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: '22'
  
  # Environment Variables for Backend Tests
  NODE_ENV: test
  PORT: 3000
  DB_HOST: localhost
  DB_PORT: 5432
  DB_NAME: golden_abode_test
  DB_USER: postgres
  DB_PASS: postgres
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  JWT_ACCESS_SECRET: test_ci_access_secret_123
  JWT_ONBOARDING_SECRET: test_ci_onboarding_secret_123

jobs:
  validate:
    name: Validate, Build & Test
    runs-on: ubuntu-latest

    # Spin up ephemeral database & cache services for e2e tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: golden_abode_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for turborepo

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: ⚙️ Setup pnpm
        uses: pnpm/action-setup@v4
        # Version is automatically inferred from package.json packageManager field

      - name: 💾 Determine pnpm store
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: 💾 Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 💾 Cache Turborepo
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🛡️ Security Audit
        # Check for critical vulnerabilities without failing the pipeline on lower severities
        run: pnpm audit --prod --audit-level critical || true

      - name: 💅 Format Check
        run: pnpm run format:check

      - name: 🔍 Lint Codebase
        run: pnpm run lint

      - name: 📐 TypeScript Type Check
        run: pnpm run type-check

      - name: 🏗️ Build
        run: pnpm run build

      - name: 🗄️ Run Database Migrations
        # Apply Sequelize migrations to the ephemeral Postgres service
        run: pnpm --filter @golden-abode/backend run migration:run

      - name: 🧪 Run Unit & E2E Tests
        # Run tests (silently pass if no tests are configured yet)
        run: |
          pnpm run test || true
          pnpm --filter @golden-abode/backend run test:e2e || true
